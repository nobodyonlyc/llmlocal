
services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    devices:
      - nvidia.com/gpu=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        MODEL=/models/Qwen3-8B-Q4_K_M.gguf
        if [ ! -f "$$MODEL" ]; then
          echo "Downloading Qwen3-8B-Q4_K_M.gguf (~4.7GB)..."
          curl -fL -o "$$MODEL.tmp" "https://huggingface.co/Qwen/Qwen3-8B-GGUF/resolve/main/Qwen3-8B-Q4_K_M.gguf"
          mv "$$MODEL.tmp" "$$MODEL"
        fi
        exec /app/llama-server -m "$$MODEL" --host 0.0.0.0 --port 8080 -ngl 999 -c 8192 --parallel 2 -cb --jinja
